<script>
    let polar = (cx, cy, r, angDeg) => {
        const a = toRad(angDeg);
        return { x: cx + r * Math.cos(a), y: cy + r * Math.sin(a) };
    },
    toRad = (deg) => ((deg - 90) * Math.PI) / 180,
    ringSectorPath = (cx, cy, r0, r1, a0, a1) => {
        const largeArc = (a1 - a0) % 360 > 180 ? 1 : 0;
        const p0 = polar(cx, cy, r1, a0);
        const p1 = polar(cx, cy, r1, a1);
        const p2 = polar(cx, cy, r0, a1);
        const p3 = polar(cx, cy, r0, a0);
        return [`M ${p0.x} ${p0.y}`, `A ${r1} ${r1} 0 ${largeArc} 1 ${p1.x} ${p1.y}`, `L ${p2.x} ${p2.y}`, `A ${r0} ${r0} 0 ${largeArc} 0 ${p3.x} ${p3.y}`, "Z"].join(" ");
    },
    animateRadius = (el, cx, cy, r0, a0, a1, rFrom, rTo) => {
        const start = performance.now();
        const step = (now) => {
            const t = Math.min(1, (now - start) / 240);
            const e = 1 - Math.pow(1 - t, 3);
            const r = rFrom + (rTo - rFrom) * e;
            el.setAttribute("d", ringSectorPath(cx, cy, r0, r, a0, a1));
            if (t < 1) requestAnimationFrame(step);
        };
        requestAnimationFrame(step);
    },
    colorWheel = (d) => {
        d.e = document.createElement("div");

            <div style="position: absolute; display: flex; justify-content: center; align-items: center; width: ${d.size}px; height: ${d.size}px; ${d.left ? `left: ${d.left}` : ""}; ${d.top ? `top: ${d.top}` : ""}; ${d.right ? `right: ${d.right}` : ""}; ${d.bottom ? `bottom: ${d.bottom}` : ""}; border-radius: 50%">

                </svg>
                <span class="slice" onclick="${d.fc}" style="position: absolute; display: flex; justify-content: center; align-items: center; width: ${d.inner * 2 - 12}px; height: ${d.inner * 2 - 12}px; background: white; border-radius: 50%; opacity: .42">

        document.getElementById("color-wheels").appendChild(d.e);

            path = document.createElementNS("http://www.w3.org/2000/svg", "path");
            path.classList.add("slice");
            path.classList.add(d.colors[i]);
            path.dataset.a0 = a0;
            path.dataset.a1 = a1;
            path.dataset.r = d.outter;
            path.setAttribute("fill", d.colors[i]);
            path.setAttribute("d", ringSectorPath(d.cx, d.cy, d.inner, d.outter, a0, a1));
            path.addEventListener("mousedown", (e) => {
                animateRadius(path, d.cx, d.cy, d.inner, a0, a1, parseFloat(path.dataset.r), d.outter + d.hover / 2);
                path.dataset.r = d.outter + d.hover - 2;
            });
            path.addEventListener("mouseup", (e) => {
                animateRadius(path, d.cx, d.cy, d.inner, a0, a1, parseFloat(path.dataset.r), d.outter + d.hover);
                path.dataset.r = d.outter + d.hover;
            });
            path.addEventListener("mouseenter", () => {
                animateRadius(path, d.cx, d.cy, d.inner, a0, a1, parseFloat(path.dataset.r), d.outter + d.hover);
                path.dataset.r = d.outter + d.hover;
            });
            path.addEventListener("mouseleave", () => {

                path.dataset.r = d.outter;
            });
            path.addEventListener("click", (e) => {
                d.fs(e, i);
            });
            d.svg.appendChild(path);
        };
    },
    createButton = (d) => {
        for (let i in d.colors)
            d.b += `<a class="color-button" onclick="showColorWheel({ i: '${i}' }); new Audio('assets/models/sounds/activity/bounceclick.ogg').play()" style="background: ${d.colors[i].hex[d.colors[i].index]}"></a>`

    },
