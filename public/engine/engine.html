    <script type="text/javascript">
      var loadJS=false
      document.onreadystatechange=()=>{
        // Start engine
        if(lsRd('eFirstRun')==null)$('#welcome').show()
        if(document.readyState==='complete'&&!loadJS){
          haltF=loadJS=true
          try{
            if(isMobile)meAndF=AppInterface.isAndroid()
          }catch(err){}
          if(isOnL()){
            serviceWorker=lsRd('serviceWorker')
            if(serviceWorker!=null){
              if('serviceWorker' in navigator){
                navigator.serviceWorker
                .register(serviceWorker+'.js')
                .then(function(registration){
                })
                .catch((err)=>{
                })
              }
            }
            serviceWorker=undefined
          }
          if(meAndF)$('#topRightNextEIconMENU').hide()
          for(i=0;i<uiAssets.length;i++)
            if(uiAssets[i].includes('css')){
              loadStyle(uiAssets[i],'head')
            }else loadScript(uiAssets[i],'head','text/javascript')
          setTimeout(function(){
            loadMainUI(allLevels(lsRd('serviceWorker')))
            $('#welcome').fadeOut('slow')
            setTimeout(function(){
              if(isMobile&&orientation==90&&lsRd('reset')==null&&lsRd('eFirstRun')){
                document.body.style.zoom=orientation==90?1:pageScale().portrait
                $('#signIn').html(`<img src="assets/images/play.gif"
                    onclick="$('#signIn').hide()setTimeout(function(){appConnect()isOutdated()},50)"
                    `+(orientation==0?'width="'+80*pageScale().portrait+'vw"':'height="'+80*pageScale().landscape+'vh"')+`
                    style="mix-blend-mode:screen"/>`)
                $('#signIn').fadeIn('slow')
              }else{
                $('#signIn').css('opacity:.1')
                setTimeout(function(){
                  $('#signIn').fadeIn('slow')
                },600)
                appConnect()
                isOutdated()
              }
            },600)
          },lsRd('eFirstRun')==null?1400:600)
        }
      }
      // Hard reload
      function isOutdated(){
        if(myUserID.validity!=cDtNly()){
          myUserID.validity=cDtNly()
          lsSv('myUserID',JSON.stringify(myUserID))
          setTimeout(function(){
            location.reload(true)
          },600)
        }
      }
      function loadApp(){
        if(lsRd('eFirstRun')==null){
          showPleaseWait(true)
        }else $('#signIn').html('')
        $('#closeDialog').show()
        try{
          $('#loadingFill').css('width','1%')
          if(lsRd('eFirstRun')!=null){
            $('#welcome').fadeOut('fast')
            $('#loadingBar').fadeIn('slow')
          }
          function loadLevels(){
            try{
              if(isURL(allLevels(lsRd('serviceWorker'))))loadScript('assets/js/engine.js','head','module')
            }catch(err){
              setTimeout(function(){
                loadLevels()
              },600)
            }
          }
          loadLevels()
        }catch(err){
          if(err.message.match(/(appConnect)/))setTimeout(function(){
            loadFailed()
          },30000)
        }
      }
      // Start engine
      function startEngine(){
        if(_lz.uid!==undefined)myUserID.uid=_lz.uid
        try{
          if(lsRd('eFirstRun')==null&&_lz.getUserName){
            $('#welcome').fadeOut('slow')
            $('#closeDialog').hide()
            opUserID()
          }else{
            eng=localStorage.getItem('_experienceParam')
            if(eng!=null){
              eng=JSON.parse(eng)
              $('body').css('background-image','url('+eng.splash+'),url(assets/images/background.jpg)')
            }else $('body').css('background-image','url(../assets/images/'+_lz.levelName+'.jpg),url(assets/images/background.jpg)')
            showProgress('10%','#3DCFFF','Initialized.',false)
            startApp('three-canvas')
            setTimeout(function(){
              if($('#progressText').text()=='Initialized.'){
                lsSv('reset','reset')
                haltF=true;loadFailed()
              }
            },3600)
            setTimeout(function(){
              if($('#progressText').text()=='Downloading...')showProgress('86%','blue','Reconnecting...',false)
              if($('#progressText').text()=='Loading...')showProgress('86%','lightgreen','Downloading...',false)
              setTimeout(function(){
                if($('#loadingBar').css('display')!='none'&&$('#progressText').text().match(/(Downloading...|Reconnecting...)/)){
                  lsSv('reset','reset')
                  haltF=true;loadFailed()
                }
              },7200)
            },14400)
          }
          haltF=false
        }catch(err){
          if(err.message.match(/(startApp)/))setTimeout(function(){
            loadFailed()
          },15000)
        }
      }
      // Load failed
      function loadFailed(){
        if(haltF){
          $('#loadingFill').css('width','100%')
          setTimeout(function(){
            if(meAndF){
              lsSv('loadmission',location.href)
              history.back()
            }else location.reload()
          },300)
        }
      }
      $(document).ready(function(){
        // Engine initialize
      })
      document.addEventListener("DOMContentLoaded",function(){
        // System routines
      })
    </script>
